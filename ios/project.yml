name: EquiCalendar
options:
  bundleIdPrefix: dev.dreamfold
  deploymentTarget:
    iOS: "26.0"
  createIntermediateGroups: true

attributes:
  LastUpgradeCheck: "2650"

settings:
  base:
    SWIFT_VERSION: "6.2"
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    VERSIONING_SYSTEM: apple-generic
    GENERATE_INFOPLIST_FILE: YES
    TARGETED_DEVICE_FAMILY: "1"
    # App uses only standard HTTPS (URLSession/TLS) — exempt from export
    # compliance, so no annual self-classification doc is required.
    INFOPLIST_KEY_ITSAppUsesNonExemptEncryption: NO
    # Signing (baked in so it survives `xcodegen generate`)
    DEVELOPMENT_TEAM: N6BK2WX94Z
    CODE_SIGN_STYLE: Automatic
    # Xcode 26 "recommended settings"
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    SWIFT_EMIT_LOC_STRINGS: YES
    ASSETCATALOG_COMPILER_GENERATE_SWIFT_ASSET_SYMBOL_EXTENSIONS: YES
    GCC_NO_COMMON_BLOCKS: YES

targets:
  EquiCalendar:
    type: application
    platform: iOS
    sources:
      - path: EquiCalendar
        excludes:
          - "EquiCalendar.entitlements"
          - "Info.plist"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.dreamfold.equicalendar
        CODE_SIGN_ENTITLEMENTS: EquiCalendar/EquiCalendar.entitlements
        # Base Info.plist (carries CKSharingSupported); generated keys merge on top.
        INFOPLIST_FILE: EquiCalendar/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        # iOS 26 windowing requires all orientations (UIRequiresFullScreen is deprecated)
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_NSLocationWhenInUseUsageDescription: "Your location is used to show equestrian events near you and sort them by distance."
        INFOPLIST_KEY_NSCalendarsWriteOnlyAccessUsageDescription: "Lets you add events to your calendar."

  EquiCalendarTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: EquiCalendarTests
    dependencies:
      - target: EquiCalendar
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: dev.dreamfold.equicalendar.tests

  EquiCalendarUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: EquiCalendarUITests
    dependencies:
      - target: EquiCalendar
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: dev.dreamfold.equicalendar.uitests
        TEST_TARGET_NAME: EquiCalendar

schemes:
  EquiCalendar:
    build:
      targets:
        EquiCalendar: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - EquiCalendarTests
        - EquiCalendarUITests
    archive:
      config: Release
