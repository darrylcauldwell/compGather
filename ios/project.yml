name: EquiCalendar
options:
  bundleIdPrefix: com.darrylcauldwell
  deploymentTarget:
    iOS: "26.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "6.2"
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    VERSIONING_SYSTEM: apple-generic
    GENERATE_INFOPLIST_FILE: YES
    TARGETED_DEVICE_FAMILY: "1"
    CODE_SIGNING_ALLOWED: NO

targets:
  EquiCalendar:
    type: application
    platform: iOS
    sources:
      - path: EquiCalendar
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.darrylcauldwell.equicalendar
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations: UIInterfaceOrientationPortrait
        INFOPLIST_KEY_NSLocationWhenInUseUsageDescription: "Your location is used to show equestrian events near you and sort them by distance."
        INFOPLIST_KEY_NSCalendarsWriteOnlyAccessUsageDescription: "Lets you add events to your calendar."

  EquiCalendarTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: EquiCalendarTests
    dependencies:
      - target: EquiCalendar
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: com.darrylcauldwell.equicalendar.tests
